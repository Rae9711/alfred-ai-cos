name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: albert
          POSTGRES_PASSWORD: albert
          POSTGRES_DB: albert
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U albert"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      ENVIRONMENT: development
      DATABASE_URL: postgresql+psycopg://albert:albert@localhost:5432/albert
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: ci-secret
      # Valid Fernet key so crypto imports succeed; not a real secret.
      TOKEN_ENCRYPTION_KEY: ZmDfcTF7_60GrrY167zsiPd67pEvs0aGOv2oasOM1Pg=
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Sync dependencies
        run: uv sync
      - name: Lint (ruff)
        run: uv run ruff check app tests
      - name: Format check (ruff format)
        run: uv run ruff format --check app tests
      - name: Type-check (mypy strict)
        run: uv run mypy app
      - name: Test (pytest)
        run: uv run pytest
      - name: Migrations apply + app boots
        run: |
          uv run alembic upgrade head
          uv run python -c "from app.main import app; assert app.openapi()"

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        run: bun install
      - name: Type-check shared-types
        run: bunx tsc --noEmit
        working-directory: packages/shared-types
      - name: Type-check mobile
        run: bunx tsc --noEmit
        working-directory: mobile
